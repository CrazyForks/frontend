name: Copy Android Signing Keys to Parent Repo

on:
  workflow_dispatch:

jobs:
  copy-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Copy signing secrets to songloft repo
        env:
          GH_TOKEN: ${{ secrets.TEMP_GH_TOKEN }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | gh secret set ANDROID_KEYSTORE_BASE64 -R songloft-org/songloft
          echo "$ANDROID_KEYSTORE_PASSWORD" | gh secret set ANDROID_KEYSTORE_PASSWORD -R songloft-org/songloft
          echo "$ANDROID_KEY_ALIAS" | gh secret set ANDROID_KEY_ALIAS -R songloft-org/songloft
          echo "$ANDROID_KEY_PASSWORD" | gh secret set ANDROID_KEY_PASSWORD -R songloft-org/songloft
          echo "✅ All 4 secrets copied to songloft-org/songloft"
