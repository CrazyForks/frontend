name: Shorebird Patch

# 手动触发的 Dart 热补丁下发（仅 Android）。补丁只对同 release-version + 同签名
# + 同构建配置的设备生效，故务必从「对应正式版 tag 的代码」上 dispatch 本 workflow
# （GitHub 会用你选择的 ref 运行本文件并 checkout 该 ref 的代码）。
# 详见 docs/cn/shorebird_hot_update.md §5。
#
# iOS 补丁需先补齐签名发布链路后再单独接入，本 workflow 暂不覆盖。

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: '目标基线版本（pubspec 形式，如 2.11.0+1，须与该正式版完全一致）'
        required: true
      track:
        description: '下发通道：先 staging 内测，验证 OK 再发 stable（全体用户）'
        type: choice
        options: [staging, beta, stable]
        default: staging

concurrency:
  group: shorebird-patch-${{ github.ref }}-${{ inputs.release_version }}
  cancel-in-progress: false

jobs:
  patch-android:
    name: Patch Android (${{ inputs.track }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: shorebirdtech/setup-shorebird@v1

      # 与 build-and-release.yml 一致：从仓库变量注入真实 app_id 覆写占位值。
      - name: Inject Shorebird app_id
        env:
          SHOREBIRD_APP_ID: ${{ vars.SHOREBIRD_APP_ID }}
        run: |
          if [ -z "$SHOREBIRD_APP_ID" ]; then
            echo "::error::缺少仓库变量 SHOREBIRD_APP_ID，无法执行 shorebird patch" >&2
            exit 1
          fi
          sed -i "s|^app_id:.*|app_id: ${SHOREBIRD_APP_ID}|" shorebird.yaml
          grep '^app_id:' shorebird.yaml

      - name: Patch Android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

          # FRONTEND_VERSION 取 release_version 的版本号部分（去掉 +build），
          # 其余 dart-define 与对应 release 保持一致（补丁快照配置必须与基线相同）。
          FRONTEND_VERSION="$(echo '${{ inputs.release_version }}' | cut -d'+' -f1)"
          COMMON_DEFINES="--dart-define=FRONTEND_VERSION=${FRONTEND_VERSION} \
            --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} \
            --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} \
            --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}"

          # 注意：patch 不传 --flutter-version，Shorebird 按 release-version 自动
          # 探测该基线当初的 Flutter 版本并用同版本编译补丁。
          shorebird patch android \
            --release-version=${{ inputs.release_version }} \
            --track=${{ inputs.track }} \
            -- $COMMON_DEFINES
