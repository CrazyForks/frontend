<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Songloft - 跨平台音乐播放器">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Songloft">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Songloft</title>
  <link rel="manifest" href="manifest.json">


</head>
<body>
  <script src="equalizer.js"></script>
  <script src="hls.min.js"></script>
  <script src="hls_bridge.js"></script>
  <script src="deploy-mode.js"></script>
  <!--
    移动端切后台回来黑屏/白屏的恢复逻辑在 Dart 侧处理(见
    lib/features/startup/presentation/startup_gate.dart)。原因:切后台时浏览器
    会丢弃 CanvasKit 的 WebGL context,引擎收到 'webglcontextlost' 会重建 GL
    surface,但重建后的 surface 是空的,必须由 framework 强制产出一帧完整重绘
    才有内容;而页面 JS 无法从外部强制 Flutter 产帧(仅派发 resize 只会调用
    invokeOnMetricsChanged 通知 framework,同尺寸下不产帧 → 白屏)。因此恢复必须
    在 Dart 侧用 scheduleForcedFrame + 标脏渲染树完成。此处仅保留下方的
    canvasKitForceMultiSurfaceRasterizer 配置:把 WebGL context 放到可观测的 DOM
    <canvas> 上,让引擎能收到 'webglcontextlost' 并重建。
  -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    var config = {
      canvasKitVariant: "full",
    };

    // Force the onscreen (multi-surface) CanvasKit rasterizer on mobile
    // browsers. Chrome's default OffscreenCanvas rasterizer keeps its WebGL
    // context on an OffscreenCanvas that is never attached to the DOM, so a
    // background GPU-context loss is invisible to the page and cannot be
    // recovered (the app paints black until a manual refresh). The onscreen
    // rasterizer (already the default on Safari/Firefox) puts the context on a
    // DOM <canvas>, which lets Flutter auto-recover on context loss and lets the
    // in-place rebuild above reach the context. Desktop keeps the offscreen path.
    var isMobileBrowser = /Android|iPhone|iPad|iPod|Mobile|Silk|Kindle/i.test(
      navigator.userAgent || ''
    );
    if (isMobileBrowser) {
      config.canvasKitForceMultiSurfaceRasterizer = true;
    }

    if (typeof _deployMode !== 'undefined' && _deployMode === 'embedded') {
      config.fontFallbackBaseUrl = "fonts/";
    }

    _flutter.loader.load({ config: config });
  </script>
</body>
</html>
